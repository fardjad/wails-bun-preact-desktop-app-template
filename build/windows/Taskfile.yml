version: '3'

includes:
  common: ../Taskfile.yml

vars:
  CROSS_IMAGE: wails-cross

tasks:
  build:
    summary: Build the application for Windows
    cmds:
      - task: '{{if and (ne OS "windows") (eq .CGO_ENABLED "1")}}build:docker{{else}}build:native{{end}}'
        vars:
          ARCH: '{{.ARCH}}'
          OUTPUT: '{{.OUTPUT}}'
          DEV: '{{.DEV}}'
          EXTRA_TAGS: '{{.EXTRA_TAGS}}'
          CGO_ENABLED: '{{.CGO_ENABLED}}'
    vars:
      CGO_ENABLED: '{{.CGO_ENABLED | default "0"}}'
      DEFAULT_OUTPUT: '{{.BIN_DIR}}/{{.APP_NAME}}.exe'
      OUTPUT: '{{.OUTPUT | default .DEFAULT_OUTPUT}}'

  build:native:
    internal: true
    deps:
      - task: common:go:mod:tidy
      - task: common:build:frontend
        vars:
          BUILD_FLAGS:
            ref: .BUILD_FLAGS
      - task: common:generate:icons
    cmds:
      - task: generate:syso
        vars:
          ARCH: '{{.ARCH | default ARCH}}'
      - go build {{.BUILD_FLAGS}} -o "{{.OUTPUT}}"
      - cmd: powershell Remove-Item wails_windows_{{.ARCH | default ARCH}}.syso
        platforms: [windows]
      - cmd: rm -f "wails_windows_{{.ARCH | default ARCH}}.syso"
        platforms: [linux, darwin]
    vars:
      BUILD_FLAGS: '{{if eq .DEV "true"}}{{if .EXTRA_TAGS}}-tags {{.EXTRA_TAGS}} {{end}}-buildvcs=false -gcflags=all="-l"{{else}}-tags production{{if .EXTRA_TAGS}},{{.EXTRA_TAGS}}{{end}} -trimpath -buildvcs=false -ldflags="-w -s -H windowsgui"{{end}}'
    env:
      GOOS: windows
      CGO_ENABLED: '{{.CGO_ENABLED | default "0"}}'
      GOARCH: '{{.ARCH | default ARCH}}'

  build:docker:
    internal: true
    deps:
      - task: common:build:frontend
      - task: common:generate:icons
    preconditions:
      - sh: docker info > /dev/null 2>&1
        msg: "Docker is required for Windows CGO cross-compilation."
      - sh: docker image inspect {{.CROSS_IMAGE}} > /dev/null 2>&1
        msg: "Docker image '{{.CROSS_IMAGE}}' not found. Run: {{.WAILS3}} task setup:docker"
    cmds:
      - task: generate:syso
        vars:
          ARCH: '{{.ARCH | default "amd64"}}'
      - docker run --rm -v "{{.ROOT_DIR}}:/app" {{.GO_CACHE_MOUNT}} {{.REPLACE_MOUNTS}} -e APP_NAME="{{.APP_NAME}}" {{if .EXTRA_TAGS}}-e EXTRA_TAGS="{{.EXTRA_TAGS}}"{{end}} "{{.CROSS_IMAGE}}" windows {{.DOCKER_ARCH}}
      - docker run --rm -v "{{.ROOT_DIR}}:/app" alpine chown -R $(id -u):$(id -g) /app/bin
      - mkdir -p "{{.BIN_DIR}}"
      - mv "bin/{{.APP_NAME}}-windows-{{.DOCKER_ARCH}}.exe" "{{.OUTPUT}}"
      - rm -f "wails_windows_{{.ARCH | default "amd64"}}.syso"
    vars:
      DOCKER_ARCH: '{{.ARCH | default "amd64"}}'
      GO_CACHE_MOUNT:
        sh: 'echo "-v ${GOPATH:-$HOME/go}/pkg/mod:/go/pkg/mod"'
      REPLACE_MOUNTS:
        sh: |
          grep -E '^replace .* => ' go.mod 2>/dev/null | while read -r line; do
            path=$(echo "$line" | sed -E 's/^replace .* => //' | tr -d '\r')
            if [ "${path#/}" = "$path" ]; then
              path="$(cd "$(dirname "$path")" 2>/dev/null && pwd)/$(basename "$path")"
            fi
            if [ -d "$path" ]; then
              echo "-v $path:$path:ro"
            fi
          done | tr '\n' ' '

  package:
    summary: Windows packaging is intentionally unsupported in this repo
    cmds:
      - 'echo "Windows packaging is intentionally unsupported in this repo." >&2; exit 1'

  generate:syso:
    summary: Generate the Windows .syso file
    dir: build
    cmds:
      - |
        set -euo pipefail
        icon_path="windows/icon.ico"

        if [ ! -f "$icon_path" ]; then
          wails_module_dir="$(go list -m -f '{{"{{.Dir}}"}}' github.com/wailsapp/wails/v3)"
          fallback_icon="$wails_module_dir/internal/commands/build_assets/windows/icon.ico"

          if [ -f "$fallback_icon" ]; then
            cp "$fallback_icon" "$icon_path"
          fi
        fi

        {{.WAILS3}} generate syso -arch {{.ARCH}} -icon "$icon_path" -manifest windows/wails.exe.manifest -info windows/info.json -out ../wails_windows_{{.ARCH}}.syso
    vars:
      ARCH: '{{.ARCH | default ARCH}}'


  run:
    summary: Run the Windows application
    deps:
      - task: build
        vars:
          DEV: "true"
    cmds:
      - "{{.BIN_DIR}}/{{.APP_NAME}}.exe"

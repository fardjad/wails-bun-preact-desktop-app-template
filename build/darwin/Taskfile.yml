version: '3'

includes:
  common: ../Taskfile.yml

vars:
  CROSS_IMAGE: wails-cross

tasks:
  build:
    summary: Build the application for macOS
    cmds:
      - task: '{{if eq OS "darwin"}}build:native{{else}}build:docker{{end}}'
        vars:
          ARCH: '{{.ARCH}}'
          DEV: '{{.DEV}}'
          OUTPUT: '{{.OUTPUT}}'
          EXTRA_TAGS: '{{.EXTRA_TAGS}}'
    vars:
      DEFAULT_OUTPUT: '{{.BIN_DIR}}/{{.APP_NAME}}'
      OUTPUT: '{{.OUTPUT | default .DEFAULT_OUTPUT}}'

  build:native:
    summary: Build the macOS application natively
    internal: true
    deps:
      - task: common:go:mod:tidy
      - task: common:build:frontend
        vars:
          BUILD_FLAGS:
            ref: .BUILD_FLAGS
      - task: common:generate:icons
    cmds:
      - |
        eval "$(just macos-build-env)"
        GOOS=darwin \
        CGO_ENABLED=1 \
        GOARCH={{.ARCH | default ARCH}} \
        go build {{.BUILD_FLAGS}} -o "{{.OUTPUT}}"
    vars:
      BUILD_FLAGS: '{{if eq .DEV "true"}}{{if .EXTRA_TAGS}}-tags {{.EXTRA_TAGS}} {{end}}-buildvcs=false -gcflags=all="-l"{{else}}-tags production{{if .EXTRA_TAGS}},{{.EXTRA_TAGS}}{{end}} -trimpath -buildvcs=false -ldflags="-w -s"{{end}}'

  build:docker:
    summary: Cross-compile macOS from Docker
    internal: true
    deps:
      - task: common:build:frontend
      - task: common:generate:icons
    preconditions:
      - sh: docker info > /dev/null 2>&1
        msg: "Docker is required for macOS cross-compilation."
      - sh: docker image inspect {{.CROSS_IMAGE}} > /dev/null 2>&1
        msg: "Docker image '{{.CROSS_IMAGE}}' not found. Run: {{.WAILS3}} task setup:docker"
    cmds:
      - docker run --rm -v "{{.ROOT_DIR}}:/app" {{.GO_CACHE_MOUNT}} {{.REPLACE_MOUNTS}} -e APP_NAME="{{.APP_NAME}}" {{if .EXTRA_TAGS}}-e EXTRA_TAGS="{{.EXTRA_TAGS}}"{{end}} {{.CROSS_IMAGE}} darwin {{.DOCKER_ARCH}}
      - docker run --rm -v "{{.ROOT_DIR}}:/app" alpine chown -R $(id -u):$(id -g) /app/bin
      - mkdir -p "{{.BIN_DIR}}"
      - mv "bin/{{.APP_NAME}}-darwin-{{.DOCKER_ARCH}}" "{{.OUTPUT}}"
    vars:
      DOCKER_ARCH: '{{.ARCH | default "arm64"}}'
      DEFAULT_OUTPUT: '{{.BIN_DIR}}/{{.APP_NAME}}'
      OUTPUT: '{{.OUTPUT | default .DEFAULT_OUTPUT}}'
      GO_CACHE_MOUNT:
        sh: 'echo "-v ${GOPATH:-$HOME/go}/pkg/mod:/go/pkg/mod"'
      REPLACE_MOUNTS:
        sh: |
          grep -E '^replace .* => ' go.mod 2>/dev/null | while read -r line; do
            path=$(echo "$line" | sed -E 's/^replace .* => //' | tr -d '\r')
            if [ "${path#/}" = "$path" ]; then
              path="$(cd "$(dirname "$path")" 2>/dev/null && pwd)/$(basename "$path")"
            fi
            if [ -d "$path" ]; then
              echo "-v $path:$path:ro"
            fi
          done | tr '\n' ' '

  build:universal:
    summary: Build the universal macOS binary
    deps:
      - task: build
        vars:
          ARCH: amd64
          OUTPUT: "{{.BIN_DIR}}/{{.APP_NAME}}-darwin-amd64"
      - task: build
        vars:
          ARCH: arm64
          OUTPUT: "{{.BIN_DIR}}/{{.APP_NAME}}-darwin-arm64"
    cmds:
      - task: '{{if eq OS "darwin"}}build:universal:lipo:native{{else}}build:universal:lipo:go{{end}}'

  build:universal:lipo:native:
    internal: true
    cmds:
      - lipo -create -output "{{.BIN_DIR}}/{{.APP_NAME}}-darwin-universal" "{{.BIN_DIR}}/{{.APP_NAME}}-darwin-amd64" "{{.BIN_DIR}}/{{.APP_NAME}}-darwin-arm64"

  build:universal:lipo:go:
    internal: true
    cmds:
      - '{{.WAILS3}} tool lipo -output "{{.BIN_DIR}}/{{.APP_NAME}}-darwin-universal" -input "{{.BIN_DIR}}/{{.APP_NAME}}-darwin-amd64" -input "{{.BIN_DIR}}/{{.APP_NAME}}-darwin-arm64"'

  package:
    summary: Package the application into a macOS .app bundle
    deps:
      - task: build
        vars:
          ARCH: '{{.ARCH}}'
          OUTPUT: '{{.OUTPUT}}'
          DEV: '{{.DEV}}'
          EXTRA_TAGS: '{{.EXTRA_TAGS}}'
    cmds:
      - task: create:app:bundle
        vars:
          OUTPUT: '{{.OUTPUT}}'
          BUNDLE_NAME: '{{.BUNDLE_NAME}}'

  package:universal:
    summary: Package the universal macOS .app bundle
    deps:
      - task: build:universal
    cmds:
      - task: create:app:bundle
        vars:
          OUTPUT: "{{.BIN_DIR}}/{{.APP_NAME}}-darwin-universal"
          BUNDLE_NAME: "{{.APP_NAME}}-darwin-universal"

  create:app:bundle:
    summary: Create a macOS .app bundle
    cmds:
      - rm -rf "{{.BIN_DIR}}/{{.BUNDLE_NAME | default .APP_NAME}}.app"
      - mkdir -p "{{.BIN_DIR}}/{{.BUNDLE_NAME | default .APP_NAME}}.app/Contents/MacOS"
      - mkdir -p "{{.BIN_DIR}}/{{.BUNDLE_NAME | default .APP_NAME}}.app/Contents/Resources"
      - |
        if [ -f build/darwin/icons.icns ]; then
          cp build/darwin/icons.icns "{{.BIN_DIR}}/{{.BUNDLE_NAME | default .APP_NAME}}.app/Contents/Resources/icons.icns"
        fi
      - |
        if [ -f build/darwin/Assets.car ]; then
          cp build/darwin/Assets.car "{{.BIN_DIR}}/{{.BUNDLE_NAME | default .APP_NAME}}.app/Contents/Resources/Assets.car"
        fi
      - cp "{{.OUTPUT | default (printf "%s/%s" .BIN_DIR .APP_NAME)}}" "{{.BIN_DIR}}/{{.BUNDLE_NAME | default .APP_NAME}}.app/Contents/MacOS/{{.APP_NAME}}"
      - cp build/darwin/Info.plist "{{.BIN_DIR}}/{{.BUNDLE_NAME | default .APP_NAME}}.app/Contents/Info.plist"
      - task: '{{if eq OS "darwin"}}codesign:adhoc{{else}}codesign:skip{{end}}'
        vars:
          BUNDLE_NAME: '{{.BUNDLE_NAME}}'

  codesign:adhoc:
    internal: true
    cmds:
      - codesign --force --deep --sign - "{{.BIN_DIR}}/{{.BUNDLE_NAME | default .APP_NAME}}.app"

  codesign:skip:
    internal: true
    cmds:
      - echo "Skipping codesign outside macOS. Sign the .app on macOS before distribution."

  run:
    summary: Run the application on macOS
    deps:
      - task: build
        vars:
          DEV: "true"
    cmds:
      - rm -rf "{{.BIN_DIR}}/{{.APP_NAME}}.dev.app"
      - mkdir -p "{{.BIN_DIR}}/{{.APP_NAME}}.dev.app/Contents/MacOS"
      - mkdir -p "{{.BIN_DIR}}/{{.APP_NAME}}.dev.app/Contents/Resources"
      - |
        if [ -f build/darwin/icons.icns ]; then
          cp build/darwin/icons.icns "{{.BIN_DIR}}/{{.APP_NAME}}.dev.app/Contents/Resources/icons.icns"
        fi
      - |
        if [ -f build/darwin/Assets.car ]; then
          cp build/darwin/Assets.car "{{.BIN_DIR}}/{{.APP_NAME}}.dev.app/Contents/Resources/Assets.car"
        fi
      - cp "{{.BIN_DIR}}/{{.APP_NAME}}" "{{.BIN_DIR}}/{{.APP_NAME}}.dev.app/Contents/MacOS/{{.APP_NAME}}"
      - cp build/darwin/Info.dev.plist "{{.BIN_DIR}}/{{.APP_NAME}}.dev.app/Contents/Info.plist"
      - codesign --force --deep --sign - "{{.BIN_DIR}}/{{.APP_NAME}}.dev.app"
      - "{{.BIN_DIR}}/{{.APP_NAME}}.dev.app/Contents/MacOS/{{.APP_NAME}}"

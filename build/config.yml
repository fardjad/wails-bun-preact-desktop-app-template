version: "3"

info:
  companyName: "Fardjad Davari"
  productName: "Cross-platform Desktop App Template"
  productIdentifier: "com.fardjad.cpdap"
  description: "A cross-platform desktop application built with Wails, Bun, and Preact."
  copyright: "(c) 2026, Fardjad Davari"
  comments: "Cross-platform Desktop App Template"
  version: "0.2.11"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend/node_modules
      - frontend/dist
      - build/bin
      - build/release
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
    git_ignore: true
  executes:
    - cmd: bun run dev:prepare
      type: blocking
    - cmd: bun run dev:frontend
      type: background
    - cmd: bun run dev:backend
      type: primary

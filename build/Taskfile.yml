version: '3'

tasks:
  go:mod:tidy:
    summary: Run go mod tidy
    internal: true
    cmds:
      - go mod tidy

  install:frontend:deps:
    summary: Install frontend dependencies with Bun
    dir: frontend
    sources:
      - package.json
      - bun.lock
    generates:
      - node_modules
    preconditions:
      - sh: bun --version
        msg: "Bun is required. Install it from https://bun.sh"
    cmds:
      - bun install

  build:frontend:
    summary: Build the frontend bundle
    dir: frontend
    sources:
      - "**/*"
      - exclude: node_modules/**/*
    generates:
      - dist/**/*
    deps:
      - task: install:frontend:deps
      - task: generate:bindings
        vars:
          BUILD_FLAGS:
            ref: .BUILD_FLAGS
    cmds:
      - bun run build

  dev:frontend:
    summary: Run the frontend dev server
    dir: frontend
    deps:
      - task: install:frontend:deps
    cmds:
      - bun run dev

  generate:bindings:
    summary: Generate Wails bindings
    deps:
      - task: go:mod:tidy
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
      - frontend/src/**/*.ts
      - frontend/src/**/*.tsx
      - frontend/index.html
    generates:
      - frontend/bindings/**/*
    cmds:
      - '{{.WAILS3}} generate bindings -f ''{{.BUILD_FLAGS | default ""}}'' -clean=true'

  generate:icons:
    summary: Generate macOS and Windows icons when build/appicon.png exists
    dir: build
    sources:
      - appicon.png
      - appicon.icon
    cmds:
      - |
        set -euo pipefail
        mkdir -p darwin windows

        if [ ! -f appicon.png ]; then
          echo "Skipping icon generation: build/appicon.png not found"
          exit 0
        fi

        if [ -f appicon.icon ]; then
          {{.WAILS3}} generate icons \
            -input appicon.png \
            -macfilename darwin/icons.icns \
            -windowsfilename windows/icon.ico \
            -iconcomposerinput appicon.icon \
            -macassetdir darwin
          exit 0
        fi

        {{.WAILS3}} generate icons \
          -input appicon.png \
          -macfilename darwin/icons.icns \
          -windowsfilename windows/icon.ico

  update:build-assets:
    summary: Update Wails build assets
    dir: build
    cmds:
      - '{{.WAILS3}} update build-assets -name "{{.APP_NAME}}" -binaryname "{{.APP_NAME}}" -config config.yml -dir .'

  setup:docker:
    summary: Build the Docker image used for cross-platform builds
    preconditions:
      - sh: docker info > /dev/null 2>&1
        msg: "Docker is required. Please install Docker first."
    vars:
      MACOS_MIN_VERSION:
        sh: awk -F= '/^MACOS_MIN_VERSION=/{print $2}' build/darwin/version.env
      MACOS_SDK_VERSION:
        sh: awk -F= '/^MACOS_SDK_VERSION=/{print $2}' build/darwin/version.env
    cmds:
      - docker build --build-arg MACOS_MIN_VERSION={{.MACOS_MIN_VERSION}} --build-arg MACOS_SDK_VERSION={{.MACOS_SDK_VERSION}} -t wails-cross -f build/docker/Dockerfile.cross build/docker/
      - docker build --build-arg MACOS_MIN_VERSION={{.MACOS_MIN_VERSION}} --build-arg MACOS_SDK_VERSION={{.MACOS_SDK_VERSION}} --platform linux/amd64 -t wails-cross-linux-amd64 -f build/docker/Dockerfile.cross build/docker/
      - docker build --build-arg MACOS_MIN_VERSION={{.MACOS_MIN_VERSION}} --build-arg MACOS_SDK_VERSION={{.MACOS_SDK_VERSION}} --platform linux/arm64 -t wails-cross-linux-arm64 -f build/docker/Dockerfile.cross build/docker/

version: '3'

info:
  companyName: "Fardjad Davari"
  productName: "Desktop Application"
  productIdentifier: "com.fardjad.desktopapplication"
  description: "A cross-platform desktop application built with Wails, Preact, and TypeScript."
  copyright: "(c) 2026, Fardjad Davari"
  comments: "Desktop Application"
  version: "0.0.0"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend/node_modules
      - frontend/dist
      - build/bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
    git_ignore: true
  executes:
    - cmd: just dev-generate-bindings
      type: blocking
    - cmd: just dev-frontend
      type: background
    - cmd: just dev-run-app
      type: primary
